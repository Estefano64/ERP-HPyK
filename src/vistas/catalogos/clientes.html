<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - HP&K ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/vistas/shared/navigation.js"></script>
    <style>.modal { display: none; } .modal.active { display: flex; }</style>
</head>
<body class="bg-gray-50">
    <div id="navigation-container"></div>
    <div class="container mx-auto px-4 py-8">
        <div class="mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-gray-800 flex items-center">
                    <i class="fas fa-users text-indigo-600 mr-3"></i> Clientes
                </h1>
                <p class="text-gray-600 mt-1">Catálogo de clientes HP&K</p>
            </div>
            <button onclick="openModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-lg font-semibold transition flex items-center">
                <i class="fas fa-plus mr-2"></i> Nuevo Cliente
            </button>
        </div>
        <div class="mb-4">
            <input type="text" id="searchInput" placeholder="Buscar cliente..." onkeyup="filterTable()"
                class="border border-gray-300 rounded-lg px-4 py-2 w-64 focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="w-full">
                <thead class="bg-indigo-700 text-white">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs uppercase">Código</th>
                        <th class="px-4 py-3 text-left text-xs uppercase">Razón Social</th>
                        <th class="px-4 py-3 text-left text-xs uppercase">RUC</th>
                        <th class="px-4 py-3 text-left text-xs uppercase">Teléfono</th>
                        <th class="px-4 py-3 text-left text-xs uppercase">Estado</th>
                        <th class="px-4 py-3 text-center text-xs uppercase">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-gray-200">
                    <tr><td colspan="6" class="text-center py-8 text-gray-500">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="catalogModal" class="modal fixed inset-0 bg-black bg-opacity-50 items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl max-h-screen overflow-y-auto">
            <div class="bg-indigo-700 text-white px-6 py-4 flex justify-between items-center">
                <h2 class="text-xl font-bold"><i class="fas fa-user-plus mr-2"></i><span id="modalTitle">Nuevo Cliente</span></h2>
                <button onclick="closeModal()" class="text-white hover:text-gray-200"><i class="fas fa-times text-2xl"></i></button>
            </div>
            <form id="catalogForm" class="p-6 grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Código *</label>
                    <input type="text" name="codigo" required maxlength="10" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">RUC</label>
                    <input type="text" name="ruc" maxlength="20" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="col-span-2">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Razón Social *</label>
                    <input type="text" name="razon_social" required maxlength="200" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="col-span-2">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Nombre Comercial</label>
                    <input type="text" name="nombre_comercial" maxlength="200" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Teléfono</label>
                    <input type="text" name="telefono" maxlength="50" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                    <input type="email" name="email" maxlength="100" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="col-span-2">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Dirección</label>
                    <input type="text" name="direccion" maxlength="300" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Contacto Principal</label>
                    <input type="text" name="contacto_principal" maxlength="200" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="flex items-center">
                    <input type="checkbox" name="activo" checked class="w-4 h-4 text-indigo-600 border-gray-300 rounded">
                    <label class="ml-2 text-sm font-semibold text-gray-700">Activo</label>
                </div>
                <div class="col-span-2 flex justify-end space-x-3 pt-2">
                    <button type="button" onclick="closeModal()" class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-100">Cancelar</button>
                    <button type="submit" class="px-6 py-2 bg-indigo-700 text-white rounded-lg hover:bg-indigo-800"><i class="fas fa-save mr-2"></i>Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API = '/api/catalogos/clientes';
        let records = [], editKey = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadRecords();
            document.getElementById('catalogForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const form = e.target;
                const data = {
                    codigo: form.codigo.value,
                    razon_social: form.razon_social.value,
                    nombre_comercial: form.nombre_comercial.value || null,
                    ruc: form.ruc.value || null,
                    direccion: form.direccion.value || null,
                    telefono: form.telefono.value || null,
                    email: form.email.value || null,
                    contacto_principal: form.contacto_principal.value || null,
                    activo: form.activo.checked
                };
                const url = editKey ? `${API}/${editKey}` : API;
                const method = editKey ? 'PUT' : 'POST';
                const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
                if (res.ok) { closeModal(); loadRecords(); } else { alert('Error al guardar'); }
            });
        });

        async function loadRecords() {
            const res = await fetch(API);
            records = await res.json();
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            if (!records.length) { tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-gray-500">No hay clientes registrados</td></tr>'; return; }
            tbody.innerHTML = records.map(r => `
                <tr class="hover:bg-gray-50">
                    <td class="px-4 py-3 font-semibold text-sm">${r.codigo}</td>
                    <td class="px-4 py-3 text-sm">${r.razon_social}</td>
                    <td class="px-4 py-3 text-sm">${r.ruc || '-'}</td>
                    <td class="px-4 py-3 text-sm">${r.telefono || '-'}</td>
                    <td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs ${r.activo ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">${r.activo ? 'Activo' : 'Inactivo'}</span></td>
                    <td class="px-4 py-3 text-center space-x-2">
                        <button onclick="editRecord('${r.codigo}')" class="text-blue-600 hover:text-blue-800"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteRecord('${r.codigo}')" class="text-red-600 hover:text-red-800"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`).join('');
        }

        function filterTable() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('#tableBody tr').forEach(r => r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none');
        }

        function openModal() { editKey = null; document.getElementById('modalTitle').textContent = 'Nuevo Cliente'; document.getElementById('catalogForm').reset(); document.querySelector('[name="activo"]').checked = true; document.getElementById('catalogModal').classList.add('active'); }
        function closeModal() { document.getElementById('catalogModal').classList.remove('active'); editKey = null; }

        function editRecord(codigo) {
            const r = records.find(x => x.codigo === codigo);
            if (!r) return;
            editKey = codigo;
            document.getElementById('modalTitle').textContent = 'Editar Cliente';
            const form = document.getElementById('catalogForm');
            form.codigo.value = r.codigo;
            form.razon_social.value = r.razon_social || '';
            form.nombre_comercial.value = r.nombre_comercial || '';
            form.ruc.value = r.ruc || '';
            form.direccion.value = r.direccion || '';
            form.telefono.value = r.telefono || '';
            form.email.value = r.email || '';
            form.contacto_principal.value = r.contacto_principal || '';
            form.activo.checked = r.activo;
            document.getElementById('catalogModal').classList.add('active');
        }

        async function deleteRecord(codigo) {
            if (!confirm('¿Eliminar este cliente?')) return;
            const res = await fetch(`${API}/${codigo}`, { method: 'DELETE' });
            if (res.ok) loadRecords(); else alert('Error al eliminar');
        }
    </script>
</body>
</html>
