<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Códigos de Reparación - HP&K ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/vistas/shared/navigation.js"></script>
    <style>
        .dropdown-menu { display: none; }
        .dropdown.active .dropdown-menu { display: block; }
        .modal { display: none; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation Menu will be loaded here -->
    <div id="navigation-container"></div>

    <!-- Header -->
    <div class="bg-gradient-to-r from-green-600 to-green-800 text-white shadow-lg">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <i class="fas fa-code text-3xl"></i>
                    <div>
                        <h1 class="text-2xl font-bold">Códigos de Reparación</h1>
                        <p class="text-green-200 text-sm">Clasificación y Codificación</p>
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <a href="/index.html" class="bg-green-700 hover:bg-green-800 px-4 py-2 rounded-lg transition">
                        <i class="fas fa-home"></i> Inicio
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Contenido Principal -->
    <div class="container mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow-lg p-6">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800 flex items-center">
                        <i class="fas fa-code text-cyan-600 mr-3"></i>
                        Códigos Reparables (CodRep)
                    </h1>
                    <p class="text-gray-500 mt-1">Catálogo de códigos reparables asociados a las OT</p>
                </div>
                <button onclick="showCreateForm()" class="bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white px-6 py-3 rounded-lg font-semibold shadow-md transition">
                    <i class="fas fa-plus mr-2"></i> Nuevo Código
                </button>
            </div>

            <!-- Filtro -->
            <div class="mb-4">
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Buscar códigos..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
            </div>

            <!-- Tabla -->
            <div class="overflow-x-auto">
                <table class="min-w-full bg-white border border-gray-200 rounded-lg">
                    <thead class="bg-gradient-to-r from-gray-100 to-gray-200">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Código</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Descripción</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Tipo</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Categoría</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Flota</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">NP</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Posición</th>
                            <th class="px-4 py-3 text-right text-xs font-semibold text-gray-700 uppercase tracking-wider">Precio</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-200"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Formulario -->
    <div id="modal" class="modal fixed inset-0 bg-gray-900 bg-opacity-50 overflow-y-auto h-full w-full z-50 items-center justify-center">
        <div class="relative mx-auto p-8 border w-11/12 max-w-3xl shadow-2xl rounded-xl bg-white my-8 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6 pb-4 border-b border-gray-200">
                <h3 class="text-3xl font-bold text-gray-800" id="modalTitle">
                    <i class="fas fa-code text-cyan-600 mr-2"></i>
                    Nuevo Código
                </h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-3xl font-bold transition">
                    &times;
                </button>
            </div>

            <form id="codigoForm" onsubmit="saveCodigo(event)" class="space-y-6">
                <input type="hidden" id="codigoId">
                
                <!-- Sección 1: Datos principales -->
                <div class="bg-gray-50 rounded-lg p-4">
                    <h4 class="text-lg font-semibold text-cyan-700 mb-4 flex items-center">
                        <i class="fas fa-id-card text-cyan-600 mr-2"></i>
                        Datos principales
                    </h4>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Código *</label>
                            <input type="text" id="codigo" required class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-cyan-500 focus:border-transparent" placeholder="Ej: CIL-001">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Tipo (código) *</label>
                            <input type="text" id="tipo_codigo" required class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-cyan-500 focus:border-transparent" placeholder="Ej: STD">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Categoría (código) *</label>
                            <input type="text" id="categoria_codigo" required class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-cyan-500 focus:border-transparent" placeholder="Ej: CILINDRO">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Flota (código) *</label>
                            <input type="text" id="flota_codigo" required class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-cyan-500 focus:border-transparent" placeholder="Ej: CAT-777">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Fabricante (código)</label>
                            <input type="text" id="fabricante_codigo" class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-cyan-500 focus:border-transparent" placeholder="Opcional">
                        </div>
                        <div class="md:col-span-3">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Descripción *</label>
                            <input type="text" id="descripcion" required class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-cyan-500 focus:border-transparent" placeholder="Descripción del código reparable">
                        </div>
                    </div>
                </div>

                <!-- Sección 2: Datos OT / adicionales -->
                <div class="bg-gray-50 rounded-lg p-4">
                    <h4 class="text-lg font-semibold text-blue-700 mb-4 flex items-center">
                        <i class="fas fa-clipboard-list text-blue-600 mr-2"></i>
                        Datos adicionales (OT / Logística)
                    </h4>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Número de parte (NP)</label>
                            <input type="text" id="np" class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Posición (código)</label>
                            <input type="text" id="posicion_codigo" class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Precio</label>
                            <input type="number" step="0.01" min="0" id="precio" class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-cyan-500 focus:border-transparent" placeholder="Opcional">
                        </div>
                    </div>
                </div>

                <!-- Botones -->
                <div class="flex justify-end space-x-3 pt-4 border-t border-gray-200">
                    <button type="button" onclick="closeModal()" class="bg-gradient-to-r from-red-500 to-red-600 hover:from-red-600 hover:to-red-700 text-white px-6 py-3 rounded-lg font-semibold shadow-md transition">
                        <i class="fas fa-times mr-2"></i> Cancelar
                    </button>
                    <button type="submit" class="bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white px-6 py-3 rounded-lg font-semibold shadow-md transition">
                        <i class="fas fa-save mr-2"></i> Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-4 right-4 px-6 py-3 rounded-lg shadow-lg text-white transform transition-transform duration-300 translate-x-full z-50"></div>

    <script>
        let codigos = [];

        // Modal functions
        function showCreateForm() {
            document.getElementById('codigoForm').reset();
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-code text-cyan-600 mr-2"></i>Nuevo Código';
            document.getElementById('codigoId').value = '';
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `fixed top-4 right-4 px-6 py-3 rounded-lg shadow-lg text-white transform transition-transform duration-300 z-50 ${
                type === 'success' ? 'bg-gradient-to-r from-green-500 to-green-600' : 'bg-gradient-to-r from-red-500 to-red-600'
            }`;
            toast.style.transform = 'translateX(0)';
            setTimeout(() => { toast.style.transform = 'translateX(150%)'; }, 3000);
        }

        // Cargar códigos desde API
        async function loadCodigos() {
            try {
                const response = await fetch('/api/cod-rep');
                codigos = await response.json();
                renderTable();
            } catch (error) {
                console.error('Error cargando códigos:', error);
                showToast('Error al cargar códigos', 'error');
            }
        }

        // Renderizar tabla principal
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            codigos.forEach(codigo => {
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="px-4 py-3 text-sm font-medium text-gray-900">${codigo.codigo || ''}</td>
                        <td class="px-4 py-3 text-sm text-gray-700">${codigo.descripcion || ''}</td>
                        <td class="px-4 py-3 text-sm text-gray-600">${codigo.tipo_codigo || ''}</td>
                        <td class="px-4 py-3 text-sm text-gray-600">${codigo.categoria_codigo || ''}</td>
                        <td class="px-4 py-3 text-sm text-gray-600">${codigo.flota_codigo || ''}</td>
                        <td class="px-4 py-3 text-sm text-gray-600">${codigo.np || ''}</td>
                        <td class="px-4 py-3 text-sm text-gray-600">${codigo.posicion_codigo || ''}</td>
                        <td class="px-4 py-3 text-sm text-gray-700 text-right">${codigo.precio != null ? codigo.precio : ''}</td>
                        <td class="px-4 py-3 text-sm">
                            <button onclick="editCodigo(${codigo.cod_rep_id})" class="text-blue-600 hover:text-blue-800 mr-3" title="Editar">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteCodigo(${codigo.cod_rep_id})" class="text-red-600 hover:text-red-800" title="Eliminar">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        // Filtrar tabla
        function filterTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('#tableBody tr');
            
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(searchTerm) ? '' : 'none';
            });
        }

        // Guardar código (crear / actualizar)
        async function saveCodigo(event) {
            event.preventDefault();
            
            const precioValor = (document.getElementById('precio').value || '').trim();

            const formData = {
                codigo: (document.getElementById('codigo').value || '').trim(),
                descripcion: (document.getElementById('descripcion').value || '').trim(),
                tipo_codigo: (document.getElementById('tipo_codigo').value || '').trim(),
                categoria_codigo: (document.getElementById('categoria_codigo').value || '').trim(),
                flota_codigo: (document.getElementById('flota_codigo').value || '').trim(),
                fabricante_codigo: (document.getElementById('fabricante_codigo').value || '').trim() || null,
                np: (document.getElementById('np').value || '').trim() || null,
                posicion_codigo: (document.getElementById('posicion_codigo').value || '').trim() || null,
                precio: precioValor ? Number(precioValor) : null,
            };

            try {
            const id = document.getElementById('codigoId').value;
                const url = id ? `/api/cod-rep/${id}` : '/api/cod-rep';
                const method = id ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    showToast(id ? 'Código actualizado exitosamente' : 'Código creado exitosamente', 'success');
                    closeModal();
                    loadCodigos();
                } else {
                    showToast('Error al guardar código', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Error al guardar código', 'error');
            }
        }

        // Editar código
        async function editCodigo(id) {
            try {
            const response = await fetch(`/api/cod-rep/${id}`);
                const codigo = await response.json();

                document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit text-cyan-600 mr-2"></i>Editar Código';
            document.getElementById('codigoId').value = codigo.cod_rep_id;
                document.getElementById('codigo').value = codigo.codigo;
            document.getElementById('tipo_codigo').value = codigo.tipo_codigo || '';
            document.getElementById('categoria_codigo').value = codigo.categoria_codigo || '';
            document.getElementById('flota_codigo').value = codigo.flota_codigo || '';
            document.getElementById('fabricante_codigo').value = codigo.fabricante_codigo || '';
            document.getElementById('descripcion').value = codigo.descripcion || '';
            document.getElementById('np').value = codigo.np || '';
            document.getElementById('posicion_codigo').value = codigo.posicion_codigo || '';
            document.getElementById('precio').value = codigo.precio != null ? codigo.precio : '';

                document.getElementById('modal').classList.add('active');
            } catch (error) {
                console.error('Error:', error);
                showToast('Error al cargar código', 'error');
            }
        }

        // Eliminar código
        async function deleteCodigo(id) {
            if (!confirm('¿Está seguro de eliminar este código?')) return;

            try {
            const response = await fetch(`/api/cod-rep/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showToast('Código eliminado exitosamente', 'success');
                    loadCodigos();
                } else {
                    showToast('Error al eliminar código', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Error al eliminar código', 'error');
            }
        }

        // Inicialización
        document.addEventListener('DOMContentLoaded', () => {
            loadCodigos();
        });
    </script>
</body>
</html>
