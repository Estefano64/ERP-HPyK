<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguimiento de Producción - HP&K ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/vistas/shared/navigation.js"></script>
    <style>
        .progress-bar {
            height: 8px;
            border-radius: 4px;
            background: #e5e7eb;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.4s ease;
        }
        .ot-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .ot-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,.12);
        }
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        input[type=range] { accent-color: #0d9488; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="navigation-container"></div>

    <!-- Header -->
    <div class="bg-gradient-to-r from-teal-600 to-teal-800 text-white shadow-lg">
        <div class="container mx-auto px-4 py-5">
            <div class="flex items-center justify-between flex-wrap gap-3">
                <div class="flex items-center space-x-4">
                    <i class="fas fa-tasks text-4xl opacity-90"></i>
                    <div>
                        <h1 class="text-2xl md:text-3xl font-bold">SEGUIMIENTO DE PRODUCCIÓN</h1>
                        <p class="text-teal-200 text-sm">Avance por componente — todas las OTs activas</p>
                    </div>
                </div>
                <a href="/operativos/index.html" class="bg-teal-700 hover:bg-teal-800 px-5 py-2 rounded-lg transition flex items-center text-sm">
                    <i class="fas fa-arrow-left mr-2"></i>Operativos
                </a>
            </div>
        </div>
    </div>

    <div class="container mx-auto px-4 py-6">

        <!-- KPI Cards -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-lg shadow p-4 flex items-center space-x-3">
                <div class="bg-teal-100 rounded-full p-3"><i class="fas fa-clipboard-list text-teal-600 text-xl"></i></div>
                <div>
                    <p class="text-xs text-gray-500">OTs Activas</p>
                    <p id="kpi-total" class="text-2xl font-bold text-teal-600">—</p>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-4 flex items-center space-x-3">
                <div class="bg-green-100 rounded-full p-3"><i class="fas fa-check-circle text-green-600 text-xl"></i></div>
                <div>
                    <p class="text-xs text-gray-500">Terminadas</p>
                    <p id="kpi-terminadas" class="text-2xl font-bold text-green-600">—</p>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-4 flex items-center space-x-3">
                <div class="bg-yellow-100 rounded-full p-3"><i class="fas fa-hourglass-half text-yellow-600 text-xl"></i></div>
                <div>
                    <p class="text-xs text-gray-500">En espera</p>
                    <p id="kpi-espera" class="text-2xl font-bold text-yellow-600">—</p>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-4 flex items-center space-x-3">
                <div class="bg-blue-100 rounded-full p-3"><i class="fas fa-chart-line text-blue-600 text-xl"></i></div>
                <div>
                    <p class="text-xs text-gray-500">Avance promedio</p>
                    <p id="kpi-promedio" class="text-2xl font-bold text-blue-600">—</p>
                </div>
            </div>
        </div>

        <!-- Filtros -->
        <div class="bg-white rounded-lg shadow p-4 mb-5">
            <div class="flex flex-wrap gap-3 items-end">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Prioridad</label>
                    <select id="filtro-prioridad" onchange="loadTracking()" class="border rounded px-3 py-1.5 text-sm">
                        <option value="">Todas</option>
                        <option value="E">Emergencia</option>
                        <option value="1">Alta (1)</option>
                        <option value="2">Media (2)</option>
                        <option value="3">Normal (3)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Estado Taller</label>
                    <select id="filtro-taller" onchange="loadTracking()" class="border rounded px-3 py-1.5 text-sm">
                        <option value="">Todos</option>
                        <option value="Pdt Evaluación">Pdt Evaluación</option>
                        <option value="Programado Evaluación">Prog. Evaluación</option>
                        <option value="Pdt proceso">Pdt Proceso</option>
                        <option value="Programado Proceso">Prog. Proceso</option>
                        <option value="Terminado">Terminado</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Buscar</label>
                    <input id="filtro-buscar" type="text" placeholder="OT, equipo, cliente…" oninput="debounceSearch()"
                        class="border rounded px-3 py-1.5 text-sm w-48">
                </div>
                <button onclick="loadTracking()" class="bg-teal-500 hover:bg-teal-600 text-white px-4 py-1.5 rounded text-sm">
                    <i class="fas fa-sync mr-1"></i>Actualizar
                </button>
                <button onclick="toggleView()" id="btn-vista" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-1.5 rounded text-sm">
                    <i class="fas fa-table mr-1"></i>Vista tabla
                </button>
            </div>
        </div>

        <!-- Grid de tarjetas -->
        <div id="grid-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
            <div class="col-span-full text-center py-16 text-gray-400">
                <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
                <p>Cargando OTs…</p>
            </div>
        </div>

        <!-- Vista tabla (hidden by default) -->
        <div id="table-container" class="hidden bg-white rounded-lg shadow overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-700 text-white">
                        <tr>
                            <th class="px-3 py-3 text-left">Prior.</th>
                            <th class="px-3 py-3 text-left">OT #</th>
                            <th class="px-3 py-3 text-left">Cliente / Equipo</th>
                            <th class="px-3 py-3 text-center">CIL %</th>
                            <th class="px-3 py-3 text-center">VAS %</th>
                            <th class="px-3 py-3 text-center">TAPA %</th>
                            <th class="px-3 py-3 text-center">PISTÓN %</th>
                            <th class="px-3 py-3 text-center">TOTAL %</th>
                            <th class="px-3 py-3 text-left">Estado Taller</th>
                            <th class="px-3 py-3 text-center">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Editar Avance -->
    <div id="modal-edicion" class="modal-overlay">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg mx-4 p-6">
            <div class="flex items-center justify-between mb-2">
                <h2 class="text-xl font-bold text-gray-800"><i class="fas fa-edit mr-2 text-teal-500"></i>Editar Avance</h2>
                <button onclick="cerrarModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
            </div>
            <div id="modal-ot-info" class="bg-teal-50 rounded-lg px-3 py-2 mb-5 text-sm text-gray-700"></div>

            <!-- Componentes -->
            <div class="space-y-4">
                <div id="comp-cilindro" class="comp-row">
                    <div class="flex justify-between items-center mb-1">
                        <label class="text-sm font-medium text-gray-700"><i class="fas fa-circle text-blue-400 mr-1"></i>Cilindro</label>
                        <span id="val-cilindro" class="text-sm font-bold text-teal-600">0%</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="range" id="range-cilindro" min="0" max="100" step="5" value="0"
                            oninput="syncInput('cilindro')" class="flex-1">
                        <input type="number" id="num-cilindro" min="0" max="100" value="0"
                            oninput="syncRange('cilindro')" class="w-16 border rounded px-2 py-1 text-sm text-center">
                    </div>
                </div>
                <div id="comp-vastago" class="comp-row">
                    <div class="flex justify-between items-center mb-1">
                        <label class="text-sm font-medium text-gray-700"><i class="fas fa-circle text-green-400 mr-1"></i>Vástago</label>
                        <span id="val-vastago" class="text-sm font-bold text-teal-600">0%</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="range" id="range-vastago" min="0" max="100" step="5" value="0"
                            oninput="syncInput('vastago')" class="flex-1">
                        <input type="number" id="num-vastago" min="0" max="100" value="0"
                            oninput="syncRange('vastago')" class="w-16 border rounded px-2 py-1 text-sm text-center">
                    </div>
                </div>
                <div id="comp-tapa" class="comp-row">
                    <div class="flex justify-between items-center mb-1">
                        <label class="text-sm font-medium text-gray-700"><i class="fas fa-circle text-yellow-400 mr-1"></i>Tapa</label>
                        <span id="val-tapa" class="text-sm font-bold text-teal-600">0%</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="range" id="range-tapa" min="0" max="100" step="5" value="0"
                            oninput="syncInput('tapa')" class="flex-1">
                        <input type="number" id="num-tapa" min="0" max="100" value="0"
                            oninput="syncRange('tapa')" class="w-16 border rounded px-2 py-1 text-sm text-center">
                    </div>
                </div>
                <div id="comp-piston" class="comp-row">
                    <div class="flex justify-between items-center mb-1">
                        <label class="text-sm font-medium text-gray-700"><i class="fas fa-circle text-red-400 mr-1"></i>Pistón</label>
                        <span id="val-piston" class="text-sm font-bold text-teal-600">0%</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="range" id="range-piston" min="0" max="100" step="5" value="0"
                            oninput="syncInput('piston')" class="flex-1">
                        <input type="number" id="num-piston" min="0" max="100" value="0"
                            oninput="syncRange('piston')" class="w-16 border rounded px-2 py-1 text-sm text-center">
                    </div>
                </div>
            </div>

            <div class="mt-5">
                <label class="block text-sm font-medium text-gray-700 mb-1">Estado Taller</label>
                <select id="modal-taller-status" class="w-full border rounded-lg px-3 py-2 text-sm">
                    <option value="Pdt Evaluación">Pdt Evaluación</option>
                    <option value="Programado Evaluación">Programado Evaluación</option>
                    <option value="Pdt proceso">Pdt Proceso</option>
                    <option value="Programado Proceso">Programado Proceso</option>
                    <option value="Terminado">Terminado</option>
                    <option value="Entregado">Entregado</option>
                    <option value="Cobranza">Cobranza</option>
                </select>
            </div>

            <div class="flex justify-end gap-3 mt-6">
                <button onclick="cerrarModal()" class="px-4 py-2 text-sm bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">Cancelar</button>
                <button onclick="guardarAvance()" class="px-5 py-2 text-sm bg-teal-500 text-white rounded-lg hover:bg-teal-600 font-medium">
                    <i class="fas fa-save mr-2"></i>Guardar
                </button>
            </div>
        </div>
    </div>

    <script>
    let allData = [];
    let vistaTabla = false;
    let editandoOtId = null;
    let searchTimeout = null;

    // ─── Colores ─────────────────────────────────────────────────────────────

    function colorPct(pct) {
        const v = parseFloat(pct) || 0;
        if (v >= 91) return 'bg-green-500';
        if (v >= 61) return 'bg-blue-400';
        if (v >= 31) return 'bg-yellow-400';
        return 'bg-red-400';
    }

    function colorTaller(status) {
        const map = {
            'Pdt Evaluación':        'bg-gray-200 text-gray-700',
            'Programado Evaluación': 'bg-sky-100 text-sky-700',
            'Pdt proceso':           'bg-yellow-100 text-yellow-800',
            'Programado Proceso':    'bg-blue-100 text-blue-800',
            'Terminado':             'bg-green-100 text-green-800',
            'Entregado':             'bg-emerald-100 text-emerald-800',
            'Cobranza':              'bg-purple-100 text-purple-800',
        };
        return map[status] || 'bg-gray-100 text-gray-600';
    }

    function colorPrioridad(p) {
        const map = {
            'E': 'bg-red-600 text-white',
            '1': 'bg-orange-500 text-white',
            '2': 'bg-yellow-500 text-white',
            '3': 'bg-green-500 text-white',
        };
        return map[p] || 'bg-gray-400 text-white';
    }

    function labelPrioridad(p) {
        return { 'E': 'EMERG', '1': 'ALTA', '2': 'MEDIA', '3': 'NORMAL' }[p] || p || '—';
    }

    // ─── Barra de progreso HTML ───────────────────────────────────────────────

    function barraComponente(label, pct, colorDot) {
        const v = parseFloat(pct) || 0;
        const fillClass = colorPct(v);
        return `
            <div class="mb-2">
                <div class="flex justify-between items-center mb-0.5">
                    <span class="text-xs text-gray-500 flex items-center gap-1">
                        <span class="w-2 h-2 rounded-full ${colorDot} inline-block"></span>${label}
                    </span>
                    <span class="text-xs font-semibold ${v >= 91 ? 'text-green-600' : v >= 61 ? 'text-blue-600' : v >= 31 ? 'text-yellow-600' : 'text-red-500'}">${v}%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill ${fillClass}" style="width:${v}%"></div>
                </div>
            </div>`;
    }

    // ─── Carga de datos ────────────────────────────────────────────────────────

    async function loadTracking() {
        const prioridad = document.getElementById('filtro-prioridad').value;
        const taller = document.getElementById('filtro-taller').value;
        const search = document.getElementById('filtro-buscar').value;

        let url = '/api/ot/produccion-tracking';
        const params = [];
        if (prioridad) params.push(`prioridad=${encodeURIComponent(prioridad)}`);
        if (taller)    params.push(`taller_status=${encodeURIComponent(taller)}`);
        if (search)    params.push(`search=${encodeURIComponent(search)}`);
        if (params.length) url += '?' + params.join('&');

        document.getElementById('grid-container').innerHTML = `
            <div class="col-span-full text-center py-16 text-gray-400">
                <i class="fas fa-spinner fa-spin text-3xl mb-3"></i><p>Cargando…</p>
            </div>`;

        try {
            const res = await fetch(url);
            allData = await res.json();
            renderVista();
            updateKPIs();
        } catch (e) {
            document.getElementById('grid-container').innerHTML =
                '<div class="col-span-full text-center py-16 text-red-400">Error al cargar datos</div>';
        }
    }

    function debounceSearch() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(loadTracking, 400);
    }

    function updateKPIs() {
        document.getElementById('kpi-total').textContent = allData.length;
        document.getElementById('kpi-terminadas').textContent =
            allData.filter(o => o.taller_status_codigo === 'Terminado').length;
        document.getElementById('kpi-espera').textContent =
            allData.filter(o => o.recursos_status_codigo && o.recursos_status_codigo.includes('espera')).length;
        const avg = allData.length
            ? (allData.reduce((s, o) => s + parseFloat(o.pct_general || 0), 0) / allData.length).toFixed(1)
            : 0;
        document.getElementById('kpi-promedio').textContent = avg + '%';
    }

    // ─── Render Grid ──────────────────────────────────────────────────────────

    function renderVista() {
        if (vistaTabla) renderTabla();
        else renderGrid();
    }

    function renderGrid() {
        const container = document.getElementById('grid-container');
        if (!allData.length) {
            container.innerHTML = `<div class="col-span-full text-center py-16 text-gray-400">
                <i class="fas fa-clipboard-list text-5xl mb-3 opacity-30"></i>
                <p class="text-lg">Sin OTs activas con los filtros aplicados</p>
            </div>`;
            return;
        }

        container.innerHTML = allData.map(ot => {
            const pctGen = parseFloat(ot.pct_general) || 0;
            const fillGen = colorPct(pctGen);
            const otLabel = ot.ot || `OT-${ot.id}`;
            const diasReq = ot.fecha_requerimiento_cliente
                ? Math.ceil((new Date(ot.fecha_requerimiento_cliente) - new Date()) / 86400000)
                : null;
            const diasStr = diasReq !== null
                ? `<span class="text-xs ${diasReq < 0 ? 'text-red-500 font-semibold' : diasReq <= 5 ? 'text-orange-500' : 'text-gray-400'}">
                     ${diasReq < 0 ? '⚠️ ' + Math.abs(diasReq) + 'd atrasada' : diasReq + 'd restantes'}
                   </span>`
                : '';

            return `
            <div class="ot-card bg-white rounded-lg shadow-md overflow-hidden">
                <!-- Card header -->
                <div class="px-4 py-3 bg-gradient-to-r from-gray-700 to-gray-800 flex items-center justify-between">
                    <div>
                        <div class="flex items-center gap-2">
                            <span class="text-white font-bold text-base">${otLabel}</span>
                            <span class="px-2 py-0.5 rounded-full text-xs font-bold ${colorPrioridad(ot.prioridad_atencion_codigo)}">${labelPrioridad(ot.prioridad_atencion_codigo)}</span>
                        </div>
                        <p class="text-gray-300 text-xs mt-0.5">${ot.cliente_nombre || '—'}</p>
                    </div>
                    <span class="px-2 py-1 rounded text-xs font-medium ${colorTaller(ot.taller_status_codigo)}">${ot.taller_status_codigo || '—'}</span>
                </div>
                <!-- Card body -->
                <div class="px-4 py-3">
                    <div class="flex items-center justify-between mb-3">
                        <div>
                            <p class="text-xs text-gray-500">Equipo</p>
                            <p class="text-sm font-semibold text-gray-800">${ot.equipo_codigo || '—'}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-gray-500">Tipo</p>
                            <p class="text-xs text-gray-600">${ot.tipo_reparacion_codigo || '—'}</p>
                            ${diasStr}
                        </div>
                    </div>

                    <!-- Barras componentes -->
                    ${barraComponente('Cilindro', ot.pct_cilindro, 'bg-blue-400')}
                    ${barraComponente('Vástago',  ot.pct_vastago,  'bg-green-400')}
                    ${barraComponente('Tapa',     ot.pct_tapa,     'bg-yellow-400')}
                    ${barraComponente('Pistón',   ot.pct_piston,   'bg-red-400')}

                    <!-- Barra general -->
                    <div class="mt-3 pt-3 border-t border-gray-100">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-xs font-semibold text-gray-600">AVANCE GENERAL</span>
                            <span class="text-sm font-bold ${pctGen >= 91 ? 'text-green-600' : pctGen >= 61 ? 'text-blue-600' : pctGen >= 31 ? 'text-yellow-600' : 'text-red-500'}">${pctGen}%</span>
                        </div>
                        <div class="progress-bar" style="height:10px">
                            <div class="progress-fill ${fillGen}" style="width:${pctGen}%"></div>
                        </div>
                    </div>
                </div>
                <!-- Card footer -->
                <div class="px-4 py-2 bg-gray-50 border-t flex gap-2">
                    <button onclick="abrirModal(${JSON.stringify(ot).replace(/"/g,'&quot;')})"
                        class="flex-1 bg-teal-500 hover:bg-teal-600 text-white py-1.5 rounded text-xs font-medium transition">
                        <i class="fas fa-edit mr-1"></i>Editar avance
                    </button>
                    <a href="/operativos/ordenes-trabajo.html?ot_id=${ot.id}" target="_blank"
                        class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-1.5 rounded text-xs transition">
                        <i class="fas fa-external-link-alt"></i>
                    </a>
                </div>
            </div>`;
        }).join('');
    }

    // ─── Render Tabla ─────────────────────────────────────────────────────────

    function renderTabla() {
        const tbody = document.getElementById('tabla-body');
        if (!allData.length) {
            tbody.innerHTML = '<tr><td colspan="10" class="text-center py-10 text-gray-400">Sin OTs activas</td></tr>';
            return;
        }
        tbody.innerHTML = allData.map(ot => {
            const p = (v) => `<span class="font-semibold ${colorPct(v).replace('bg-','text-').replace('-400','-600').replace('-500','-600')}">${parseFloat(v)||0}%</span>`;
            return `<tr class="border-b hover:bg-gray-50">
                <td class="px-3 py-2"><span class="px-2 py-0.5 rounded text-xs font-bold ${colorPrioridad(ot.prioridad_atencion_codigo)}">${labelPrioridad(ot.prioridad_atencion_codigo)}</span></td>
                <td class="px-3 py-2 font-mono text-xs font-semibold">${ot.ot || ot.id}</td>
                <td class="px-3 py-2 text-xs"><div class="font-medium">${ot.cliente_nombre || '—'}</div><div class="text-gray-400">${ot.equipo_codigo || ''}</div></td>
                <td class="px-3 py-2 text-center">${p(ot.pct_cilindro)}</td>
                <td class="px-3 py-2 text-center">${p(ot.pct_vastago)}</td>
                <td class="px-3 py-2 text-center">${p(ot.pct_tapa)}</td>
                <td class="px-3 py-2 text-center">${p(ot.pct_piston)}</td>
                <td class="px-3 py-2 text-center"><span class="font-bold text-gray-700">${parseFloat(ot.pct_general)||0}%</span></td>
                <td class="px-3 py-2"><span class="px-2 py-0.5 rounded text-xs ${colorTaller(ot.taller_status_codigo)}">${ot.taller_status_codigo||'—'}</span></td>
                <td class="px-3 py-2 text-center">
                    <button onclick="abrirModal(${JSON.stringify(ot).replace(/"/g,'&quot;')})" class="bg-teal-500 text-white px-2 py-1 rounded text-xs hover:bg-teal-600">
                        <i class="fas fa-edit"></i>
                    </button>
                </td>
            </tr>`;
        }).join('');
    }

    // ─── Toggle vista ─────────────────────────────────────────────────────────

    function toggleView() {
        vistaTabla = !vistaTabla;
        document.getElementById('grid-container').classList.toggle('hidden', vistaTabla);
        document.getElementById('table-container').classList.toggle('hidden', !vistaTabla);
        document.getElementById('btn-vista').innerHTML = vistaTabla
            ? '<i class="fas fa-th-large mr-1"></i>Vista tarjetas'
            : '<i class="fas fa-table mr-1"></i>Vista tabla';
        renderVista();
    }

    // ─── Modal edición ────────────────────────────────────────────────────────

    function abrirModal(ot) {
        if (typeof ot === 'string') ot = JSON.parse(ot);
        editandoOtId = ot.id;

        document.getElementById('modal-ot-info').innerHTML =
            `<strong>${ot.ot || 'OT-'+ot.id}</strong> &nbsp;|&nbsp; ${ot.equipo_codigo || '—'} &nbsp;|&nbsp; ${ot.cliente_nombre || '—'}`;

        ['cilindro','vastago','tapa','piston'].forEach(comp => {
            const campo = comp === 'vastago' ? 'pct_vastago' : `pct_${comp}`;
            const v = Math.round(parseFloat(ot[campo]) || 0);
            document.getElementById(`range-${comp}`).value = v;
            document.getElementById(`num-${comp}`).value = v;
            document.getElementById(`val-${comp}`).textContent = v + '%';
        });

        document.getElementById('modal-taller-status').value = ot.taller_status_codigo || 'Pdt proceso';
        document.getElementById('modal-edicion').classList.add('open');
    }

    function cerrarModal() {
        document.getElementById('modal-edicion').classList.remove('open');
        editandoOtId = null;
    }

    function syncInput(comp) {
        const v = document.getElementById(`range-${comp}`).value;
        document.getElementById(`num-${comp}`).value = v;
        document.getElementById(`val-${comp}`).textContent = v + '%';
    }

    function syncRange(comp) {
        let v = parseInt(document.getElementById(`num-${comp}`).value) || 0;
        v = Math.min(100, Math.max(0, v));
        document.getElementById(`range-${comp}`).value = v;
        document.getElementById(`num-${comp}`).value = v;
        document.getElementById(`val-${comp}`).textContent = v + '%';
    }

    async function guardarAvance() {
        if (!editandoOtId) return;
        const body = {
            pct_cilindro:  parseInt(document.getElementById('num-cilindro').value) || 0,
            pct_vastago:   parseInt(document.getElementById('num-vastago').value)  || 0,
            pct_tapa:      parseInt(document.getElementById('num-tapa').value)     || 0,
            pct_piston:    parseInt(document.getElementById('num-piston').value)   || 0,
            taller_status_codigo: document.getElementById('modal-taller-status').value
        };
        try {
            const res = await fetch(`/api/ot/${editandoOtId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (!res.ok) throw new Error((await res.json()).error || 'Error');
            cerrarModal();
            await loadTracking();
            showToast('Avance actualizado', 'success');
        } catch (e) {
            showToast('Error: ' + e.message, 'error');
        }
    }

    // ─── Toast ────────────────────────────────────────────────────────────────

    function showToast(msg, type = 'info') {
        const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-teal-600' };
        const el = document.createElement('div');
        el.className = `fixed bottom-6 right-6 ${colors[type]||colors.info} text-white px-5 py-3 rounded-lg shadow-lg text-sm z-50`;
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .4s'; setTimeout(() => el.remove(), 400); }, 3000);
    }

    // ─── Init ─────────────────────────────────────────────────────────────────

    document.addEventListener('DOMContentLoaded', loadTracking);
    </script>
</body>
</html>
